<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Store</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h2>AJIO</h2>
  <div>
    <span onclick="showWishlist()">❤️</span>
    <span onclick="showCart()">🛍️</span>
  </div>
</header>

<!-- Slider -->
<div class="slider">
  <img id="slide" src="https://picsum.photos/id/1011/800/300">
</div>

<!-- Categories -->
<div class="categories">
  <div onclick="openCategory('men')">Men</div>
  <div onclick="openCategory('women')">Women</div>
  <div onclick="openCategory('kids')">Kids</div>
</div>

<!-- Filters -->
<div class="filters">
  <input type="text" id="search" placeholder="Search...">
  <select id="priceFilter">
    <option value="all">All</option>
    <option value="low">Below 700</option>
    <option value="high">Above 700</option>
  </select>
</div>

<div id="subcategories"></div>
<div id="products"></div>

<div id="wishlistBox" class="panel"></div>
<div id="cartBox" class="panel"></div>

<script src="script.js"></script>
</body>
</html>
