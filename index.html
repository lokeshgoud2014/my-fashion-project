<!DOCTYPE html>
<html>
<head>
  <title>Fashion Defines Everything</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Fashion</div>

  <input id="search" placeholder="Search for products..." onkeyup="renderProducts()">

  <div class="icons">
    <span onclick="showWishlist()">❤️</span>
    <span onclick="showCart()">🛒 (<b id="count">0</b>)</span>
    <span onclick="toggleProfile()">👤</span>
  </div>
</header>

<!-- PROFILE DROPDOWN -->
<div id="profileMenu" class="dropdown hide">
  <h4 id="username">User</h4>
  <p onclick="showOrders()">Orders</p>
  <p>Help Center</p>
  <p>Manage Account</p>
  <p>Settings</p>
  <p class="logout">Logout</p>
</div>

<!-- SLIDER -->
<div class="slider">
  <img src="https://picsum.photos/800/250?1">
  <img src="https://picsum.photos/800/250?2">
  <img src="https://picsum.photos/800/250?3">
</div>

<h2 class="title">Fashion Carnival 🔥 50% OFF</h2>

<!-- CATEGORY -->
<div class="grid">
  <div onclick="openCategory('Men')">MEN</div>
  <div onclick="openCategory('Women')">WOMEN</div>
  <div onclick="openCategory('Kids')">KIDS</div>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid"></div>

<!-- WISHLIST -->
<div id="wishlist" class="panel hide"></div>

<!-- CART -->
<div id="cart" class="panel hide"></div>

<!-- ORDERS -->
<div id="orders" class="panel hide"></div>

<script src="script.js"></script>
</body>
</html>
