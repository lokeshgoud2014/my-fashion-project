<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Fashion Recommender</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h2>Smart Fashion</h2>
  <div>
    <span onclick="showWishlist()">❤️</span>
    <span onclick="showCart()">🛍️</span>
  </div>
</header>

<!-- Banner -->
<div class="banner">
  <h1>Find Your Perfect Outfit 👗</h1>
</div>

<!-- Selection -->
<div class="selectors">
  <select id="occasion">
    <option>Party</option>
    <option>College</option>
    <option>Wedding</option>
  </select>

  <select id="weather">
    <option>Summer</option>
    <option>Winter</option>
  </select>

  <select id="style">
    <option>Casual</option>
    <option>Trendy</option>
  </select>

  <button onclick="recommend()">Get Outfit 🔥</button>
</div>

<!-- Results -->
<div id="results" class="products"></div>

<!-- Wishlist -->
<div id="wishlistBox" class="panel"></div>

<!-- Cart -->
<div id="cartBox" class="panel"></div>

<script src="script.js"></script>
</body>
</html>
