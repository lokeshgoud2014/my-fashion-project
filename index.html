<!DOCTYPE html>
<html>
<head>
  <title>Fashion Defines Everything</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<header class="header">
  <div class="logo">Fashion Defines Everything</div>

  <nav class="nav">
    <a onclick="filterCollection('All')">HOME</a>
    <a onclick="filterCollection('Men')">MEN</a>
    <a onclick="filterCollection('Women')">WOMEN</a>
    <a onclick="filterCollection('Kids')">KIDS</a>
  </nav>

  <div class="right">
    <input type="text" id="search" placeholder="Search..." onkeyup="renderProducts()">
    <span onclick="showSection('wishlist')">❤️ Wishlist</span>
    <span onclick="showSection('cart')">
      🛒 Cart <b id="cartCount">0</b>
    </span>
  </div>
</header>

<section class="banner">
  <h1>Fashion Carnival</h1>
  <p>50-80% OFF</p>
</section>

<h2 class="title">Products</h2>
<div id="products" class="grid"></div>

<div id="wishlist" class="panel"></div>
<div id="cart" class="panel"></div>

<script src="./script.js"></script>
</body>
</html>
