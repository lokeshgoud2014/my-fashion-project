<!DOCTYPE html>
<html>
<head>
  <title>Fashion Defines Everything</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Fashion</div>

  <nav>
    <a onclick="setCategory('All')">HOME</a>
    <a onclick="setCategory('Men')">MEN</a>
    <a onclick="setCategory('Women')">WOMEN</a>
    <a onclick="setCategory('Kids')">KIDS</a>
  </nav>

  <div class="actions">
    <input id="search" placeholder="Search..." onkeyup="renderProducts()">
    <span onclick="showSection('cart')">🛒 (<b id="count">0</b>)</span>
  </div>
</header>

<div id="products" class="grid"></div>

<!-- PRODUCT DETAILS -->
<div id="details" class="popup"></div>

<!-- CART -->
<div id="cart" class="panel"></div>

<!-- CHECKOUT -->
<div class="panel">
  <h3>Checkout</h3>
  <form onsubmit="placeOrder(event)">
    <input id="name" placeholder="Name" required>
    <input id="address" placeholder="Address" required>

    <select id="payment">
      <option>UPI</option>
      <option>Card</option>
      <option>Cash on Delivery</option>
    </select>

    <button>Place Order</button>
  </form>
  <p id="msg"></p>
</div>

<!-- ORDERS -->
<div id="orders" class="panel"></div>

<script src="script.js"></script>
</body>
</html>
