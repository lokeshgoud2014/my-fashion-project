<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Store</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h2>AJIO</h2>
  <div>
    <span onclick="showWishlist()">❤️</span>
    <span onclick="showCart()">🛍️</span>
  </div>
</header>

<!-- Banner -->
<div class="banner">
  <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
</div>

<!-- Categories -->
<div class="categories">
  <div onclick="openCategory('men')">Men</div>
  <div onclick="openCategory('women')">Women</div>
  <div onclick="openCategory('kids')">Kids</div>
</div>

<div id="subcategories"></div>
<div id="products"></div>

<!-- Wishlist -->
<div id="wishlistBox" class="panel"></div>

<!-- Cart -->
<div id="cartBox" class="panel"></div>

<script src="script.js"></script>
</body>
</html>
