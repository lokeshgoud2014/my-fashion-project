<!DOCTYPE html>
<html>
<head>
  <title>Fashion Defines Everything</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Fashion</div>

  <input placeholder="Search...">

  <div class="icons">
    <div class="icon" id="wishIcon">❤️</div>
    <div class="icon" id="cartIcon">🛒 <span id="count">0</span></div>
    <div class="icon" id="profileIcon">👤</div>
  </div>
</header>

<!-- DROPDOWNS -->
<div id="wishlistBox" class="dropdown hide"></div>
<div id="cartBox" class="dropdown hide"></div>

<div id="profileBox" class="dropdown hide">
  <h4>Username</h4>
  <p onclick="showOrders()">Orders</p>
  <p>Settings</p>
  <p class="logout">Logout</p>
</div>

<!-- FILTER -->
<div class="filters">
  <select onchange="filterPrice(this.value)">
    <option value="All">All</option>
    <option value="1000">Below 1000</option>
    <option value="2000">Below 2000</option>
  </select>
</div>

<!-- CATEGORY -->
<div class="category">
  <div onclick="openCategory('Men')" class="box">
    <img src="https://source.unsplash.com/300x300/?men,fashion">
    <p>MEN</p>
  </div>
  <div onclick="openCategory('Women')" class="box">
    <img src="https://source.unsplash.com/300x300/?women,fashion">
    <p>WOMEN</p>
  </div>
  <div onclick="openCategory('Kids')" class="box">
    <img src="https://source.unsplash.com/300x300/?kids,fashion">
    <p>KIDS</p>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid"></div>

<!-- PRODUCT DETAILS -->
<div id="details" class="popup hide"></div>

<!-- CHECKOUT -->
<div id="checkout" class="panel hide">
  <h3>Delivery Address</h3>
  <input id="addr" placeholder="Enter address">

  <h3>Payment Details</h3>
  <input placeholder="Card Number">
  <input placeholder="Expiry (MM/YY)">
  <input placeholder="CVV">

  <h4>OR</h4>
  <input placeholder="Enter UPI ID">

  <button onclick="placeOrder()">Pay Now</button>
</div>

<!-- ORDERS -->
<div id="orders" class="panel hide"></div>

</body>
<script src="script.js"></script>
</html>
