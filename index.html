<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion PRO MAX+</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{display:flex;justify-content:space-between;padding:10px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px}
.card{background:#fff;padding:10px;text-align:center;border-radius:10px;cursor:pointer}
.card img{width:100%;height:120px;object-fit:cover}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.product{background:#fff;padding:10px;border-radius:10px}
.product img{width:100%;height:120px;object-fit:cover}
select,button{margin-top:5px;width:100%}
.panel{position:fixed;top:60px;right:10px;background:#fff;padding:10px;width:250px;display:none}
</style>
</head>
<body>

<header>
<div>AJIO</div>
<div>
<span onclick="showCart()">🛒</span>
</div>
</header>

<!-- MAIN CATEGORY -->
<div id="main" class="grid">
<div class="card" onclick="showSub('men')"><img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b"><p>Men</p></div>
<div class="card" onclick="showSub('women')"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d"><p>Women</p></div>
<div class="card" onclick="showSub('kids')"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9"><p>Kids</p></div>
</div>

<!-- SUB CATEGORY -->
<div id="sub" class="grid" style="display:none"></div>

<!-- PRODUCTS -->
<div id="products" class="products" style="display:none"></div>

<!-- CART -->
<div class="panel" id="cartBox">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p id="total"></p>
<select id="payment">
<option>UPI</option>
<option>Card</option>
<option>Cash on Delivery</option>
</select>
<button onclick="placeOrder()">Place Order</button>
</div>

<script>
let subCategories={
men:["Traditional","Party","Summer","Shirts","Jeans","Tshirts"],
women:["Sarees","Party","Kurtis","Tops","Jeans","Gowns"],
kids:["Frocks","Sets","Tshirts","Shorts","Winter","Party"]
};

let products=[];
let cart=[];

function showSub(type){
document.getElementById("main").style.display="none";
let sub=document.getElementById("sub");
sub.style.display="grid";
sub.innerHTML="";
subCategories[type].forEach(s=>{
sub.innerHTML+=`<div class='card' onclick="showProducts('${s}')">${s}</div>`;
});
}

function showProducts(cat){
document.getElementById("sub").style.display="none";
let p=document.getElementById("products");
p.style.display="grid";
p.innerHTML="";

products=[];
for(let i=1;i<=20;i++){
products.push({name:cat+" "+i,price:500+i*10,img:"https://source.unsplash.com/200x200/?fashion"});
}

products.forEach((item,i)=>{
p.innerHTML+=`<div class='product'>
<img src='${item.img}'>
<p>${item.name}</p>
<p>₹${item.price}</p>
<select id='size${i}'><option>S</option><option>M</option><option>L</option></select>
<select id='color${i}'><option>Red</option><option>Blue</option><option>Black</option></select>
<button onclick='addCart(${i})'>Add to Cart</button>
</div>`;
});
}

function addCart(i){
let size=document.getElementById("size"+i).value;
let color=document.getElementById("color"+i).value;
cart.push({...products[i],size,color});
renderCart();
}

function renderCart(){
let list=document.getElementById("cartItems");
let total=0;list.innerHTML="";
cart.forEach(item=>{
total+=item.price;
list.innerHTML+=`<li>${item.name} (${item.size},${item.color})</li>`;
});
document.getElementById("total").innerText="Total ₹"+total;
}

function showCart(){
let c=document.getElementById("cartBox");
c.style.display=c.style.display==='block'?'none':'block';
}

function placeOrder(){
let method=document.getElementById("payment").value;
alert("Order placed with "+method+" 🎉");
cart=[];
renderCart();
}
</script>

</body>
</html>
