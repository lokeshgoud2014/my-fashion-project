<!DOCTYPE html>
<html>
<head>
  <title>Fashion Defines Everything</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Fashion</div>

  <input placeholder="Search for products...">

  <div class="icons">
    <div class="icon" onclick="toggleWishlist()">❤️</div>
    <div class="icon" onclick="toggleCart()">🛒 <span id="count">0</span></div>
    <div class="icon" onclick="toggleProfile()">👤</div>
  </div>
</header>

<!-- DROPDOWNS -->
<div id="wishlistBox" class="dropdown hide"></div>
<div id="cartBox" class="dropdown hide"></div>

<div id="profileBox" class="dropdown hide">
  <h4>Username</h4>
  <p onclick="showOrders()">Orders</p>
  <p>Settings</p>
  <p class="logout">Logout</p>
</div>

<!-- CATEGORY -->
<div class="category">
  <div onclick="openCategory('Men')" class="box">
    <img src="https://picsum.photos/300?1"><p>MEN</p>
  </div>
  <div onclick="openCategory('Women')" class="box">
    <img src="https://picsum.photos/300?2"><p>WOMEN</p>
  </div>
  <div onclick="openCategory('Kids')" class="box">
    <img src="https://picsum.photos/300?3"><p>KIDS</p>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid"></div>

<!-- PRODUCT DETAILS -->
<div id="details" class="popup hide"></div>

<!-- ORDERS -->
<div id="orders" class="panel hide"></div>

<script src="script.js"></script>
</body>
</html>
