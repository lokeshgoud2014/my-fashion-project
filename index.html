<!DOCTYPE html>
<html>
<head>
  <title>Fashion Defines Everything</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <span class="logo">Fashion</span>
  <input id="search" placeholder="Search fashion...">
  <div class="icons">
    ❤️ 🛒 👤
  </div>
</header>

<!-- SLIDER -->
<div class="slider">
  <img src="https://picsum.photos/800/250?1">
  <img src="https://picsum.photos/800/250?2">
  <img src="https://picsum.photos/800/250?3">
</div>

<h2 class="title">Fashion Carnival 🔥 50% OFF</h2>

<!-- CATEGORY -->
<div class="grid">
  <div onclick="openCategory('Men')">MEN</div>
  <div onclick="openCategory('Women')">WOMEN</div>
  <div onclick="openCategory('Kids')">KIDS</div>
</div>

<!-- PRODUCTS -->
<div id="productPage" class="hide">
  <h2 id="catTitle"></h2>
  <div id="products" class="grid"></div>
</div>

<!-- CART -->
<div id="cartPage" class="hide"></div>

<!-- CHECKOUT -->
<div id="checkoutPage" class="hide">
  <h3>Delivery Address</h3>
  <input id="addr" placeholder="Enter address">
  <h3>Payment</h3>
  <select>
    <option>Cash on Delivery</option>
  </select>
  <button onclick="placeOrder()">Place Order</button>
</div>

<!-- SUCCESS -->
<div id="successPage" class="hide">
  <h2>✅ Order Successfully Placed</h2>
</div>

<script src="script.js"></script>
</body>
</html>
