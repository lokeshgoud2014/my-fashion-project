<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Store</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .search-box input {
      padding: 8px;
      width: 200px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    .nav-icons span {
      margin-left: 15px;
      cursor: pointer;
    }

    .categories {
      display: flex;
      overflow-x: auto;
      background: white;
      padding: 10px;
    }

    .category {
      margin-right: 15px;
      text-align: center;
      cursor: pointer;
    }

    .category img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }

    .banner {
      margin: 15px;
      border-radius: 10px;
      overflow: hidden;
    }

    .banner img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .product {
      background: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .product h4 {
      margin: 10px 0 5px;
    }

    .product p {
      color: green;
      font-weight: bold;
    }

    footer {
      background: white;
      padding: 10px;
      display: flex;
      justify-content: space-around;
      position: fixed;
      bottom: 0;
      width: 100%;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
    }

  </style>
</head>
<body>

<header>
  <div class="logo">AJIO</div>
  <div class="search-box">
    <input type="text" placeholder="Search products...">
  </div>
  <div class="nav-icons">
    <span>🔔</span>
    <span>❤️</span>
    <span>🛍️</span>
  </div>
</header>

<div class="categories">
  <div class="category">
    <img src="https://via.placeholder.com/50">
    <p>Men</p>
  </div>
  <div class="category">
    <img src="https://via.placeholder.com/50">
    <p>Women</p>
  </div>
  <div class="category">
    <img src="https://via.placeholder.com/50">
    <p>Kids</p>
  </div>
  <div class="category">
    <img src="https://via.placeholder.com/50">
    <p>Footwear</p>
  </div>
</div>

<div class="banner">
  <img src="https://via.placeholder.com/800x300?text=Sale+40-80%+OFF">
</div>

<div class="products" id="productList"></div>

<footer>
  <div>🏠 Home</div>
  <div>🔥 Trends</div>
  <div>📂 Categories</div>
  <div>👤 Account</div>
</footer>

<script>
  const products = [
    {name: "T-Shirt", price: "₹499", img: "https://via.placeholder.com/150"},
    {name: "Jeans", price: "₹999", img: "https://via.placeholder.com/150"},
    {name: "Shoes", price: "₹1499", img: "https://via.placeholder.com/150"},
    {name: "Dress", price: "₹799", img: "https://via.placeholder.com/150"}
  ];

  const container = document.getElementById("productList");

  products.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>${p.price}</p>
      </div>
    `;
  });
</script>

</body>
</html>
