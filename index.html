<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Fashion Store</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h2>Smart Fashion</h2>
  <div>
    <span onclick="showWishlist()">❤️</span>
    <span onclick="showCart()">🛍️</span>
  </div>
</header>

<div class="categories">
  <div onclick="loadCategory('men')">Men</div>
  <div onclick="loadCategory('women')">Women</div>
  <div onclick="loadCategory('kids')">Kids</div>
</div>

<div id="products" class="products"></div>

<div id="wishlistBox" class="panel"></div>
<div id="cartBox" class="panel"></div>

<script src="script.js"></script>
</body>
</html>
