<!DOCTYPE html>
<html>
<head>
  <title>Fashion Defines Everything</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Fashion Defines Everything</div>

  <nav>
    <a onclick="setCategory('All')">HOME</a>
    <a onclick="setCategory('Men')">MEN</a>
    <a onclick="setCategory('Women')">WOMEN</a>
    <a onclick="setCategory('Kids')">KIDS</a>
  </nav>

  <div class="actions">
    <input type="text" id="search" placeholder="Search..." onkeyup="renderProducts()">
    <span onclick="scrollToSection('wishlist')">❤️</span>
    <span onclick="scrollToSection('cart')">🛒 (<b id="count">0</b>)</span>
  </div>
</header>

<!-- 🔄 AUTO SLIDER -->
<div class="slider">
  <div class="slides">
    <div class="slide" onclick="setCategory('Men')">🔥 50% OFF - MEN</div>
    <div class="slide" onclick="setCategory('Women')">💃 30% OFF - WOMEN</div>
    <div class="slide" onclick="setCategory('Kids')">🧒 70% OFF - KIDS</div>
  </div>
</div>

<h2 class="title">Products</h2>
<div id="products" class="grid"></div>

<div id="wishlist" class="panel"></div>
<div id="cart" class="panel"></div>

<!-- Checkout -->
<div class="panel">
  <h3>Checkout</h3>
  <form onsubmit="placeOrder(event)">
    <input placeholder="Name" id="name" required>
    <input placeholder="Phone" id="phone" required>
    <input placeholder="Address" id="address" required>
    <select id="payment">
      <option>UPI</option>
      <option>Card</option>
      <option>Cash on Delivery</option>
    </select>
    <button>Place Order</button>
  </form>
  <p id="msg"></p>
</div>

<div id="orders" class="panel"></div>

<script src="./script.js"></script>
</body>
</html>
