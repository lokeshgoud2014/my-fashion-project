<!DOCTYPE html>
<html>
<head>
  <title>Fashion Defines Everything</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Fashion</div>
  <input placeholder="Search for products...">
  <div class="icons">
    ❤️ <span onclick="showCart()">🛒 (<b id="count">0</b>)</span> 👤
  </div>
</header>

<h2 class="title">Fashion Carnival 🔥 50% OFF</h2>

<!-- CATEGORY BOXES -->
<div class="category">
  <div onclick="openCategory('Men')" class="box">
    <img src="https://source.unsplash.com/300x300/?men,fashion">
    <p>MEN</p>
  </div>

  <div onclick="openCategory('Women')" class="box">
    <img src="https://source.unsplash.com/300x300/?women,fashion">
    <p>WOMEN</p>
  </div>

  <div onclick="openCategory('Kids')" class="box">
    <img src="https://source.unsplash.com/300x300/?kids,fashion">
    <p>KIDS</p>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid"></div>

<!-- CART -->
<div id="cart" class="panel hide"></div>

<!-- CHECKOUT -->
<div id="checkout" class="panel hide">
  <h3>Delivery Address</h3>
  <input id="addr" placeholder="Enter address">

  <h3>Payment</h3>
  <select id="payment">
    <option>UPI</option>
    <option>Card</option>
    <option>Cash on Delivery</option>
  </select>

  <button onclick="placeOrder()">Place Order</button>
</div>

<!-- SUCCESS -->
<div id="success" class="panel hide">
  <h2>✅ Order Placed Successfully</h2>
</div>

<!-- ORDERS -->
<div id="orders" class="panel hide"></div>

<script src="script.js"></script>
</body>
</html>
